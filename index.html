<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook Mogul</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#c8bda0;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px 6px;background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E")}
/* ===== NOTEBOOK CONTAINER ===== */
.notebook{background:#faf5eb;max-width:440px;width:100%;min-height:94vh;border-radius:2px 10px 10px 2px;box-shadow:4px 4px 20px rgba(0,0,0,.22),inset 0 0 60px rgba(139,119,91,.06);position:relative;padding:0 0 0 42px;border-left:3px solid #c43e3e;overflow:hidden}
.notebook::before{content:'';position:absolute;left:0;top:0;bottom:0;width:42px;background:linear-gradient(90deg,#e6dbc6 0%,#e0d5be 30px,#ece4d4 31px,#faf5eb 42px);z-index:2}
/* spiral rings */
.notebook::after{content:'';position:absolute;left:3px;top:24px;bottom:24px;width:20px;background:repeating-linear-gradient(180deg,transparent 0px,transparent 16px,#a89880 16px,#a89880 18px,#c8bda0 18px,#c8bda0 28px,#a89880 28px,#a89880 30px,transparent 30px,transparent 46px);z-index:3}
.ruled-lines{position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0,transparent 29px,#ddd5c4 29px,#ddd5c4 30px);pointer-events:none;opacity:.25;z-index:0}
.content{position:relative;z-index:1;padding:14px 14px 20px 10px}
/* ===== TYPOGRAPHY ===== */
h1{font-family:'Patrick Hand',cursive;font-size:1.5rem;font-weight:400;color:#4a3a2a;text-align:center;margin-bottom:4px;letter-spacing:.5px}
h2{font-family:'Patrick Hand',cursive;font-size:1.15rem;font-weight:400;color:#5a4a3a;margin:12px 0 6px}
h3{font-size:.88rem;font-weight:700;color:#6b5b4a}
.subtitle{font-size:.8rem;color:#8a7a68;text-align:center;margin-bottom:10px}
/* ===== STATUS BAR ===== */
.status-bar{background:linear-gradient(135deg,#4a6a3a,#3d5c30);color:#fff;padding:8px 10px;border-radius:8px;margin-bottom:6px;display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:.75rem;font-weight:600;box-shadow:0 2px 6px rgba(74,106,58,.3)}
.status-bar .stat{display:flex;justify-content:space-between}
.status-bar .stat-label{opacity:.75;font-size:.68rem;text-transform:uppercase;letter-spacing:.3px}
.status-bar .stat-value{font-weight:800}
.status-bar .location-row{grid-column:1/-1;text-align:center;font-size:.82rem;padding-top:3px;border-top:1px solid rgba(255,255,255,.2);margin-top:1px}
/* ===== WAGON BAR ===== */
.wagon-bar{background:#e4dbc8;border-radius:10px;height:10px;margin:4px 0 6px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.1)}
.wagon-fill{height:100%;background:linear-gradient(90deg,#5a8a4a,#72a85a);border-radius:10px;transition:width .4s ease}
.wagon-fill.warning{background:linear-gradient(90deg,#c48a2a,#e0a840)}
.wagon-fill.full{background:linear-gradient(90deg,#b83a2a,#d04a3a)}
.wagon-text{font-size:.68rem;font-weight:700;color:#7a6a58;text-align:right}
/* ===== TABS ===== */
.tabs{display:flex;gap:1px;margin-bottom:0}
.tab{flex:1;padding:8px 2px;text-align:center;font-size:.68rem;font-weight:700;background:#e4dbc8;border:1px solid #d0c4a8;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;color:#8a7a68;transition:all .2s;text-transform:uppercase;letter-spacing:.4px}
.tab:hover{background:#f0e8d4;color:#5a4a3a}
.tab.active{background:#faf5eb;color:#4a3a2a;border-bottom:1px solid #faf5eb;margin-bottom:-1px;position:relative;z-index:1;box-shadow:0 -2px 4px rgba(0,0,0,.04)}
.tab-content{border:1px solid #d0c4a8;border-radius:0 0 8px 8px;padding:10px;min-height:300px;background:#faf5eb;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* ===== CARDS ===== */
.card{background:#fff;border:1px solid #e0d6c2;border-radius:8px;padding:8px 10px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.card-title{font-weight:700;font-size:.85rem;color:#4a3a2a}
.price{font-weight:800;color:#4a6a3a;font-size:.9rem}
.price.sell{color:#b85c2a}
/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-primary{background:#4a6a3a;color:#fff;box-shadow:0 2px 4px rgba(74,106,58,.25)}.btn-primary:hover{background:#3d5c30;box-shadow:0 3px 8px rgba(74,106,58,.35)}
.btn-sell{background:#b85c2a;color:#fff;box-shadow:0 2px 4px rgba(184,92,42,.25)}.btn-sell:hover{background:#a04c1a}
.btn-travel{background:#3a5a7a;color:#fff;box-shadow:0 2px 4px rgba(58,90,122,.25)}.btn-travel:hover{background:#2a4a6a}
.btn-tip{background:#7a5a3a;color:#fff;box-shadow:0 2px 4px rgba(122,90,58,.25)}.btn-tip:hover{background:#6a4a2a}
.btn-sm{padding:4px 8px;font-size:.7rem;border-radius:6px}
.btn-lg{padding:10px 20px;font-size:.92rem;border-radius:10px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
/* ===== BANNER ===== */
.banner{padding:7px 10px;border-radius:8px;font-size:.75rem;font-weight:600;text-align:center;margin-bottom:6px;line-height:1.35;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.banner-warn{background:#fef9e7;color:#7a6210;border:1px solid #f0d860}
.banner-info{background:#eaf5ec;color:#2a5a30;border:1px solid #72b87a}
.banner-danger{background:#fdeced;color:#6a1a20;border:1px solid #e06a70}
/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(30,25,18,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:modalFadeIn .25s ease;backdrop-filter:blur(2px)}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#faf5eb;border-radius:14px;padding:22px 18px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px rgba(0,0,0,.05);text-align:center;animation:modalSlideUp .3s ease}
@keyframes modalSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal h2{margin-bottom:8px;font-family:'Patrick Hand',cursive;font-size:1.4rem;color:#4a3a2a}.modal p{font-size:1.0rem;color:#5a4a3a;margin-bottom:10px;line-height:1.5}
.modal .tip-text{font-size:.92rem;color:#7a5a3a;font-style:italic;margin-top:8px;padding:8px 10px;background:#f0e8d4;border-radius:8px;border-left:3px solid #b85c2a;text-align:left;line-height:1.4}
.modal-buttons{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:4px}
/* ===== INVENTORY GRID ===== */
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.inv-item{background:#fff;border:1px solid #e0d6c2;border-radius:10px;padding:10px 6px;text-align:center;transition:transform .15s}
.inv-item:hover{transform:scale(1.02)}
.inv-item .emoji{font-size:1.8rem;display:block;margin-bottom:2px}
.inv-item .name{font-size:.72rem;font-weight:700;color:#5a4a3a}
.inv-item .count{font-size:1.1rem;font-weight:800;color:#4a6a3a}
/* ===== PROGRESS TRACK ===== */
.progress-track{display:flex;gap:3px;margin:6px 0}
.progress-dot{flex:1;height:8px;border-radius:4px;background:#e0d6c2;transition:background .3s}
.progress-dot.unlocked{background:#4a6a3a}
.progress-dot.current{background:#b85c2a;animation:pulse .8s infinite alternate}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
/* ===== SPARKLINE ===== */
.chart-container{background:#fff;border:1px solid #e0d6c2;border-radius:10px;padding:8px;margin:8px 0;box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}
canvas{width:100%;height:120px}
/* ===== ENCOUNTER LOG ===== */
.encounter{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.76rem;border-bottom:1px solid #f0e8d4}
.encounter:last-child{border-bottom:none}
.encounter .emoji{font-size:1.2rem}
/* ===== START SCREEN ===== */
.start-screen{text-align:center;padding:16px 6px}
.start-screen h1{font-size:1.7rem;margin-bottom:2px}
.mode-card{background:#fff;border:2px solid #e0d6c2;border-radius:12px;padding:14px;margin:8px 0;cursor:pointer;transition:all .25s;text-align:left;position:relative;overflow:hidden}
.mode-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#4a6a3a;opacity:0;transition:opacity .2s}
.mode-card:hover{border-color:#4a6a3a;transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.mode-card:hover::before{opacity:1}
.mode-card.selected{border-color:#4a6a3a;background:#f0f8e8}
.mode-card h3{font-family:'Patrick Hand',cursive;font-size:1.1rem;margin-bottom:4px;color:#4a3a2a}.mode-card p{font-size:.76rem;color:#6b5b4a;line-height:1.4}
.mode-detail{font-size:.76rem;color:#5a4a3a;margin:3px 0;line-height:1.3}
.mode-detail .label{font-weight:700;color:#6b5b4a}
.mode-list{margin:4px 0 4px 16px;padding:0}
.mode-list li{font-size:.76rem;color:#5a4a3a;margin:2px 0;line-height:1.35}
/* ===== CALIBRATION ===== */
.cal-product{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e0d6c2;border-radius:10px;padding:10px;margin:6px 0}
.cal-product .emoji{font-size:1.6rem}
.cal-info{flex:1;font-size:.82rem}
.cal-info .name{font-weight:700}
/* ===== END SCREEN ===== */
.end-screen{padding:8px 4px}
.grade-display{font-family:'Patrick Hand',cursive;font-size:3.5rem;font-weight:400;text-align:center;margin:8px 0;text-shadow:0 2px 4px rgba(0,0,0,.1);animation:gradeReveal .5s ease}
@keyframes gradeReveal{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.grade-A{color:#4a6a3a}.grade-B{color:#5a8a4a}.grade-C{color:#b85c2a}.grade-D{color:#c9802a}.grade-F{color:#b83a2a}
.end-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:.82rem;border-bottom:1px solid #f0e8d4}
.end-stat:last-child{border-bottom:none}
.lesson-card{background:#f5ede0;border-radius:8px;padding:9px 12px;margin:5px 0;font-size:.78rem;line-height:1.45;color:#4a3a2a;border-left:3px solid #b85c2a}
.who-met{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0e8d4;font-size:.8rem}
.who-met:last-child{border-bottom:none}
.who-met .emoji{font-size:1.3rem}
/* ===== UPGRADE OFFER ===== */
.upgrade-card{background:linear-gradient(135deg,#faf5eb,#fff);border:2px solid #b85c2a;border-radius:12px;padding:14px;margin:8px 0;text-align:center;box-shadow:0 2px 8px rgba(184,92,42,.15)}
.upgrade-card h3{font-family:'Patrick Hand',cursive;color:#b85c2a;font-size:1.05rem}
/* ===== MISC ===== */
.hidden{display:none!important}
.text-center{text-align:center}
.text-muted{color:#8a7a68;font-size:.76rem}
.mt-2{margin-top:8px}.mb-2{margin-bottom:8px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:.66rem;font-weight:700}
.badge-new{background:#eaf5ec;color:#2a5a30}
/* ===== NAME ENTRY ===== */
.name-input{width:100%;padding:10px 12px;border:2px solid #d0c4a8;border-radius:8px;font-family:'Patrick Hand',cursive;font-size:1.1rem;color:#4a3a2a;background:#fff;outline:none;transition:border-color .2s}
.name-input:focus{border-color:#4a6a3a}
.name-input::placeholder{color:#b8a890}
.name-label{font-family:'Patrick Hand',cursive;font-size:.95rem;color:#5a4a3a;margin-bottom:4px;display:block}
/* ===== ADVISOR (MAEVE) ===== */
.advisor-modal{background:#faf5eb;border-radius:14px;padding:18px 16px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px rgba(0,0,0,.05);animation:modalSlideUp .3s ease}
.advisor-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.advisor-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#e8c87a,#d4a84a);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.15);flex-shrink:0;overflow:hidden}
.advisor-name{font-family:'Patrick Hand',cursive;font-size:1.05rem;color:#4a3a2a}
.advisor-title{font-size:.68rem;color:#8a7a68}
.advisor-body{font-size:1.0rem;color:#4a3a2a;line-height:1.5;margin-bottom:12px}
.advisor-body strong{color:#2B4C7E}
/* ===== RESPONSIVE ===== */
@media(max-width:360px){.notebook{padding-left:32px}.notebook::before{width:32px;background:linear-gradient(90deg,#e6dbc6 0%,#e0d5be 22px,#ece4d4 23px,#faf5eb 32px)}.notebook::after{left:1px;width:16px}.content{padding:10px 10px 14px 6px}.tab{font-size:.62rem;padding:6px 2px}}
/* ===== TOS & COPYRIGHT ===== */
.tos-check{display:flex;align-items:flex-start;gap:8px;margin:12px 0;text-align:left}
.tos-check input[type="checkbox"]{margin-top:3px;width:18px;height:18px;accent-color:#4a6a3a;flex-shrink:0}
.tos-check label{font-size:.75rem;color:#5a4a3a;line-height:1.4;cursor:pointer}
.tos-link{color:#2B4C7E;text-decoration:underline;cursor:pointer}
.copyright-footer{text-align:center;font-size:.65rem;color:#a89880;padding:12px 0 4px;border-top:1px solid #e4dbc8;margin-top:16px}
.tos-modal-body{font-size:.75rem;color:#4a3a2a;line-height:1.5;text-align:left;max-height:60vh;overflow-y:auto;padding:10px;background:#fff;border:1px solid #e0d6c2;border-radius:8px;margin-bottom:10px}
.tos-modal-body h3{font-size:.85rem;color:#2B4C7E;margin:10px 0 4px}
.tos-modal-body p{margin-bottom:6px}
</style>
</head>
<body>
<div class="notebook">
<div class="ruled-lines"></div>
<div class="content" id="app">

</div>
</div>

    activeTab:'buy', gameOver:false, lastEvent:null,
    // Holistic grading tracking
    locationsVisited:{}, productsBought:{}, productsSold:{},
    // Calibration result
    calSkill: 0,
    // Career Mode
    isCareer: false, careerLevel: null, profitStreak: 0, bestProfitStreak: 0
  };
  PRODUCTS.forEach(p => G.inventory[p.id] = 0);
  G.locationsVisited[NEIGHBORHOODS[0].id] = 1;
  generatePrices();
  render();
}

function startCareerMode(carryOver) {
  // Carry over cash, inventory, wagon from the completed Full Market game
  const prevCash = carryOver.cash;
  const prevInventory = carryOver.inventory;
  const prevWagon = carryOver.wagonCapacity;
  const prevUpgradeIndex = carryOver.wagonUpgradeIndex;
  const prevAvgBuy = carryOver.avgBuyPrice;

  G = {
    mode: 'full', days: 30, day: 1, cash: prevCash, location: 0,
    inventory: {}, netWorth: 0, netWorthHistory: [],
    wagonCapacity: prevWagon, wagonUpgradeIndex: prevUpgradeIndex,
    soldToday: false, hasSoldThisTurn: false, boughtHere: false, arrivedViaTravel: false, daysAtLocation: 0,
    totalRevenue: 0, totalProfit: 0, travelCount: 0,
    encounters: [], tipSpend: 0, tipCount: 0,
    unlocked: PRODUCTS.map(p => p.id),
    prices: null, activeEffects: {}, complianceWarning: false,
    personalBest: loadPersonalBest('career_1_1'),
    adaptive: { skillScore: 0.3, eventBoost: 0, volatilityMult: 1.1, eddieAggro: 1.1 },
    sellHistory: [], buyHistory: [],
    lossCount: 0, lossTotalUnits: 0, lossFirstSeen: false,
    avgBuyPrice: { ...prevAvgBuy },
    activeTab: 'buy', gameOver: false, lastEvent: null,
    locationsVisited: {}, productsBought: {}, productsSold: {},
    calSkill: 0.3,
    // Career Mode fields
    isCareer: true, careerLevel: '1-1', profitStreak: 0, bestProfitStreak: 0
  };
  // Copy inventory
  PRODUCTS.forEach(p => { G.inventory[p.id] = prevInventory[p.id] || 0; });
  G.locationsVisited[NEIGHBORHOODS[0].id] = 1;
  // Calculate starting net worth
  generatePrices();
  updateNetWorth();
  G.netWorthHistory = [G.netWorth];
  render();
  showModal({
    type: 'career_start', title: 'Career Mode: The Hustle',
    desc: 'You\u2019ve proven you can run a business. Now prove you can run it well. This is a new 30-day season \u2014 same market, higher expectations. Earn an A grade to advance to Level 1-2.',
    emoji: '\uD83C\uDF1F',
    tip: 'Your cash and inventory carried over. The market adapts to experienced players. Focus on margin discipline, diversification, and smart market research.'
  });
}

// ===== PERSISTENCE =====
function loadPersonalBest(mode) {
  try { return parseFloat(localStorage.getItem('fptp_pb_'+mode)) || 50; } catch(e){ return 50; }
}
function savePersonalBest(mode, val) {
  try { localStorage.setItem('fptp_pb_'+mode, val); } catch(e){}
}

// ===== PRICE ENGINE =====
function generatePrices() {
  G.prices = {};
  const vm = G.adaptive.volatilityMult;
  NEIGHBORHOODS.forEach(n => {
    G.prices[n.id] = {};
    PRODUCTS.forEach(p => {
      const mod = n.mods[p.id] || 1.0;
      // Buy price
      const buyRange = p.buyMax - p.buyMin;
      const buyBase = p.buyMin + Math.random() * buyRange;
      // Sell price with location modifier and volatility
      const sellRange = (p.sellMax - p.sellMin) * vm;
      const sellBase = p.sellMin + Math.random() * sellRange;
      let sellPrice = sellBase * mod;
      // Apply saturation if current location
      if (n.id === NEIGHBORHOODS[G.location].id) {
        const satPenalty = Math.max(0, (G.daysAtLocation - 1) * 0.13);
        sellPrice *= (1 - Math.min(satPenalty, 0.50));
      }
      // Apply active effects
      if (G.activeEffects.half_sell && n.id === NEIGHBORHOODS[G.location].id) sellPrice *= 0.5;
      if (G.activeEffects.drop_sell && n.id === NEIGHBORHOODS[G.location].id) sellPrice *= (1 - G.activeEffects.drop_sell);
      if (G.activeEffects.crawley_goodwill && n.id === NEIGHBORHOODS[G.location].id) sellPrice *= 1.2;
      if (G.activeEffects.cold_snap && (p.id==='lemonade'||p.id==='water') && n.id === NEIGHBORHOODS[G.location].id) sellPrice *= 0.3;
      let buyPrice = buyBase;
      if (G.activeEffects.cold_snap && (p.id==='lemonade'||p.id==='water') && n.id === NEIGHBORHOODS[G.location].id) buyPrice *= 0.4;
      if (G.activeEffects.raise_buy && n.id === NEIGHBORHOODS[G.location].id) buyPrice *= (1 + G.activeEffects.raise_buy);
      if (G.activeEffects.global_buy_up) buyPrice *= (1 + G.activeEffects.global_buy_up);
      G.prices[n.id][p.id] = { buy: Math.round(buyPrice*100)/100, sell: Math.round(sellPrice*100)/100 };
    });
  });
}

// ===== WAGON =====
function totalInventory() { return Object.values(G.inventory).reduce((s,v)=>s+v,0); }
function wagonFree() { return G.wagonCapacity - totalInventory(); }
function wagonPercent() { return (totalInventory() / G.wagonCapacity) * 100; }

// ===== UNLOCKED PRODUCTS =====
function getUnlocked() {
  if (G.mode === 'full') return PRODUCTS;
  return PRODUCTS.filter(p => G.day >= p.unlockDay);
}
function checkNewUnlocks() {
  if (G.mode !== 'starter') return null;
  const newly = PRODUCTS.filter(p => p.unlockDay === G.day && !G.unlocked.includes(p.id));
  newly.forEach(p => G.unlocked.push(p.id));
  return newly.length > 0 ? newly : null;
}

// ===== ADAPTIVE DIFFICULTY =====
function updateAdaptive() {
  if (G.mode !== 'full') return;
  // Calculate skill score based on performance
  const expectedNW = 50 + (G.day * 5); // rough expected curve
  const ratio = G.netWorth / expectedNW;
  if (ratio > 1.5) G.adaptive.skillScore = Math.min(G.adaptive.skillScore + 0.1, 1.0);
  else if (ratio > 1.2) G.adaptive.skillScore = Math.min(G.adaptive.skillScore + 0.05, 1.0);
  // Adjust parameters
  G.adaptive.eventBoost = G.adaptive.skillScore * 0.15;
  G.adaptive.volatilityMult = 1.0 + (G.adaptive.skillScore * 0.4);
  G.adaptive.eddieAggro = 1.0 + (G.adaptive.skillScore * 0.5);
}

// ===== EVENT SYSTEM =====
function rollForEvent() {
  // Base probability: starts lower, ramps up over game. Full Market ramps slower over 30 days.
  const progress = G.day / G.days; // 0 to 1
  const baseProb = G.mode === 'full'
    ? 0.20 + progress * 0.20 + G.adaptive.eventBoost   // 20%-40% for Full Market
    : 0.25 + progress * 0.25;                            // 25%-50% for Starter
  if (Math.random() > baseProb) return null;
  // Cooldown: no events on consecutive days (skip if last encounter was yesterday)
  const lastEncDay = G.encounters.length > 0 ? G.encounters[G.encounters.length - 1].day : 0;
  if (G.day - lastEncDay <= 1 && G.day > 2) return null;
  // Check compliance warning penalty
  if (G.complianceWarning) {
    G.complianceWarning = false;
    G.cash -= 10;
    G.encounters.push({ ...ANTAGONISTS.davis, eventName:'Compliance Fine!', day:G.day });
    return { type:'compliance_fine', title:'Compliance Fine!', desc:'You didn\'t move! Inspector Davis fined you $10.', emoji:'🕵️', tip:'Ignoring warnings costs money. Act on information while you still can.' };
  }
  const eligible = EVENTS.filter(e => G.day >= e.minDay);
  if (eligible.length === 0) return null;
  const event = eligible[Math.floor(Math.random() * eligible.length)];
  const ant = ANTAGONISTS[event.ant];
  G.encounters.push({ ...ant, eventName:event.name, day:G.day });
  // Apply effects
  G.activeEffects = {};
  G.complianceWarning = false;
  switch(event.effect) {
    case 'no_sell': G.soldToday = true; G.hasSoldThisTurn = true; break;
    case 'fine': G.cash = Math.max(0, G.cash - event.value); break;
    case 'half_sell': G.activeEffects.half_sell = true; generatePrices(); break;
    case 'lose_inv': {
      const invBefore = totalInventory();
      if (invBefore > 0) {
        const pct = event.value;
        const confiscated = [];
        Object.keys(G.inventory).forEach(k => {
          const loss = Math.floor(G.inventory[k] * pct);
          if (loss > 0) {
            const prod = PRODUCTS.find(p => p.id === k);
            confiscated.push(`${loss} ${prod ? prod.name : k}`);
            G.inventory[k] -= loss;
          }
        });
        const confStr = confiscated.join(', ');
        event._dynamicDesc = `Inspector Davis conducted a compliance audit and confiscated 30% of your inventory: ${confStr}. Regulatory compliance means meeting health and safety standards \u2014 failing costs you product.`;
      } else {
        G.cash = Math.max(0, G.cash - 5);
        event._dynamicDesc = 'Inspector Davis found no inventory to confiscate, but fined you $5 for incomplete records. Even without product on hand, businesses must maintain proper documentation.';
      }
      break;
    }
    case 'compliance_warn': G.complianceWarning = true; break;
    case 'day_lost_fine': G.cash = Math.max(0, G.cash - event.value); advanceDay(true); break;
    case 'drop_sell': G.activeEffects.drop_sell = event.value; generatePrices(); break;
    case 'raise_buy': G.activeEffects.raise_buy = event.value; generatePrices(); break;
    case 'choice_crawley': break;
    case 'choice_eddie': G.activeEffects.drop_sell = event.value; generatePrices(); break;
    case 'choice_compliance': break;
    case 'storm_standard': {
      const invBefore = totalInventory();
      const losses = [];
      if (invBefore > 0) {
        Object.keys(G.inventory).forEach(k => {
          const loss = Math.floor(G.inventory[k] * event.value);
          if (loss > 0) {
            const prod = PRODUCTS.find(p => p.id === k);
            losses.push(loss + ' ' + (prod ? prod.name : k));
            G.inventory[k] -= loss;
          }
        });
        const lossStr = losses.join(', ');
        event._dynamicDesc = 'A storm hit! This is an example of an external risk \u2014 an event outside your control that disrupts your business. You lost: ' + lossStr + '. Sell prices are halved today, but you can still sell.';
      } else {
        event._dynamicDesc = 'A storm hit! This is an example of an external risk \u2014 an event outside your control. No inventory was damaged, but sell prices are halved today due to low foot traffic.';
      }
      G.activeEffects.half_sell = true;
      generatePrices();
      break;
    }
    case 'storm_severe': {
      const invBefore2 = totalInventory();
      const losses2 = [];
      if (invBefore2 > 0) {
        Object.keys(G.inventory).forEach(k => {
          const loss = Math.floor(G.inventory[k] * event.value);
          if (loss > 0) {
            const prod = PRODUCTS.find(p => p.id === k);
            losses2.push(loss + ' ' + (prod ? prod.name : k));
            G.inventory[k] -= loss;
          }
        });
        const lossStr = losses2.join(', ');
        event._dynamicDesc = 'A severe storm shut everything down! You lost: ' + lossStr + '. This is a major external risk \u2014 some events are so disruptive that your business simply cannot operate today.';
      } else {
        event._dynamicDesc = 'A severe storm shut everything down! No inventory was damaged, but you lost a full day of operations.';
      }
      G.soldToday = true;
      G.hasSoldThisTurn = true;
      break;
    }
    case 'cold_snap': G.activeEffects.cold_snap = true; generatePrices(); break;
    case 'global_buy_up': G.activeEffects.global_buy_up = event.value; generatePrices(); break;
  }
  const desc = event._dynamicDesc || event.desc;
  return { type:event.effect, title:event.name, desc, emoji:ant.emoji, tip:event.tip, antName:ant.name };
}

// ===== WAGON UPGRADE CHECK =====
function checkWagonUpgrade() {
  const upgrades = WAGON_UPGRADES[G.mode] || WAGON_UPGRADES.starter;
  if (G.wagonUpgradeIndex >= upgrades.length) return null;
  const upgrade = upgrades[G.wagonUpgradeIndex];
  if (G.netWorth >= upgrade.threshold && G.day >= upgrade.minDay) return upgrade;
  return null;
}

// ===== DAY MANAGEMENT =====
function advanceDay(skipEvent) {
  G.day++;
  G.soldToday = false;
  G.hasSoldThisTurn = false;
  G.boughtHere = false;
  G.arrivedViaTravel = G._willArrive || false;
  G._willArrive = false;
  G.activeEffects = {};
  if (G.day > G.days) { endGame(); return; }
  generatePrices();
  updateAdaptive();
  updateNetWorth();
  const newProds = checkNewUnlocks();
  if (!skipEvent) {
    const event = rollForEvent();
    if (event) { G.lastEvent = event; }
    else if (newProds) { G.lastEvent = { type:'unlock', title:'New Product Available!', desc:`${newProds.map(p=>p.emoji+' '+p.name).join(', ')} just entered your market! A wider product mix gives you more ways to earn \u2014 that\u2019s called diversification.`, emoji:'\uD83C\uDF89', tip:'Diversification means spreading your investments across different products. If one product\u2019s price drops, others can still be profitable.' }; }
    else { G.lastEvent = null; }
  }
  // Saturation warning
  if (G.daysAtLocation >= 3 && !G.lastEvent) {
    G.lastEvent = { type:'saturation', title:'Market Saturated!', desc:`You\u2019ve been in ${NEIGHBORHOODS[G.location].name} for ${G.daysAtLocation} days. This is called market saturation \u2014 when there\u2019s too much supply in one place, prices drop. Your sell prices here are falling!`, emoji:'\uD83D\uDCC9', tip:'Market saturation is a signal to move. Smart business owners find new markets before profits disappear.' };
  }
  render();
  if (G.lastEvent) {
    if (G.lastEvent.type === 'choice_crawley') {
      showChoiceModal(G.lastEvent.title, G.lastEvent.emoji, G.lastEvent.desc, G.lastEvent.tip, [
        { id: 'crawley1', label: '\uD83C\uDF3F Mow her lawn (costs $3 in time) \u2014 earn goodwill' },
        { id: 'crawley1', label: '\u274C Ignore her \u2014 risk a $5 fine' }
      ]);
    } else if (G.lastEvent.type === 'choice_eddie') {
      showChoiceModal(G.lastEvent.title, G.lastEvent.emoji, G.lastEvent.desc, G.lastEvent.tip, [
        { id: 'eddie1', label: '\uD83D\uDCAA Stay and compete at lower prices' },
        { id: 'eddie1', label: '\uD83D\uDCB5 Pay Eddie $8 to leave' }
      ]);
    } else if (G.lastEvent.type === 'choice_compliance') {
      showChoiceModal(G.lastEvent.title, G.lastEvent.emoji, G.lastEvent.desc, G.lastEvent.tip, [
        { id: 'davis2', label: '\u2705 Fix it now for $5 (proactive)' },
        { id: 'davis2', label: '\u23F3 Defer \u2014 risk $10 fine tomorrow' }
      ]);
    } else {
      showModal(G.lastEvent);
    }
  }
}

function updateNetWorth() {
  let invValue = 0;
  const loc = NEIGHBORHOODS[G.location].id;
  PRODUCTS.forEach(p => {
    if (G.inventory[p.id] > 0 && G.prices[loc] && G.prices[loc][p.id]) {
      invValue += G.inventory[p.id] * G.prices[loc][p.id].sell;
    }
  });
  G.netWorth = Math.round((G.cash + invValue) * 100) / 100;
  G.netWorthHistory.push(G.netWorth);
}

// ===== ACTIONS =====
function buyProduct(productId, qty) {
  const loc = NEIGHBORHOODS[G.location].id;
  const price = G.prices[loc][productId].buy;
  const cost = price * qty;
  if (cost > G.cash || qty > wagonFree()) return;
  G.cash = Math.round((G.cash - cost)*100)/100;
  // Update average buy price using weighted average
  const prevQty = G.inventory[productId];
  const prevAvg = G.avgBuyPrice[productId] || 0;
  G.avgBuyPrice[productId] = prevQty + qty > 0 ? ((prevAvg * prevQty) + (price * qty)) / (prevQty + qty) : price;
  G.inventory[productId] += qty;
  G.buyHistory.push({ product:productId, qty, price, day:G.day });
  G.productsBought[productId] = (G.productsBought[productId] || 0) + qty;
  if (G.mode === 'full') G.boughtHere = true;
  updateNetWorth();
  render();
  if (!checkAdvisorTutorial()) checkAdvisorContextual();
}

function sellProduct(productId, qty) {
  if (G.soldToday || qty <= 0 || G.inventory[productId] < qty) return;
  // Full Market: hard guard — must have traveled to sell
  if (G.mode === 'full' && !G.arrivedViaTravel) return;
  const loc = NEIGHBORHOODS[G.location].id;
  const price = G.prices[loc][productId].sell;
  const revenue = price * qty;
  G.cash = Math.round((G.cash + revenue)*100)/100;
  G.inventory[productId] -= qty;
  G.totalRevenue += revenue;
  // Calculate profit/loss using tracked average buy price
  const avgCost = G.avgBuyPrice[productId] || 0;
  const profit = (price - avgCost) * qty;
  G.totalProfit += profit;
  // Detect loss
  const isLoss = price < avgCost;
  if (isLoss) {
    G.lossCount++;
    G.lossTotalUnits += qty;
    if (G.isCareer) G.profitStreak = 0; // reset streak on loss
  } else if (G.isCareer) {
    G.profitStreak++;
    if (G.profitStreak > G.bestProfitStreak) G.bestProfitStreak = G.profitStreak;
  }
  G.sellHistory.push({ product:productId, qty, price, day:G.day, avgCost, isLoss });
  G.productsSold[productId] = (G.productsSold[productId] || 0) + qty;
  G.hasSoldThisTurn = true;
  updateNetWorth();
  render();
  // Show vocabulary-enriched loss popup
  if (isLoss && !G.lossFirstSeen) {
    G.lossFirstSeen = true;
    const product = PRODUCTS.find(p => p.id === productId);
    showModal({
      type: 'loss_warning',
      title: 'Negative Margin!',
      desc: `You sold ${product.name} for $${price.toFixed(2)} each, but you paid an average of $${avgCost.toFixed(2)}. The difference between your buy price and sell price is called your profit margin \u2014 and yours just went negative. You lost $${Math.abs(profit).toFixed(2)} on that trade.`,
      emoji: '\uD83D\uDCC9',
      tip: 'In business, occasional losses happen. But consistent losses signal a problem. Smart owners track their margins and adjust their strategy.'
    });
  } else if (isLoss) {
    // Subsequent losses: subtler banner (already visible in the sell history)
  }
  // Profit streak milestones (Career Mode only)
  if (G.isCareer && !isLoss && (G.profitStreak === 5 || G.profitStreak === 10 || G.profitStreak === 20)) {
    showModal({
      type: 'streak', title: `${G.profitStreak}-Sale Streak! \uD83D\uDD25`,
      desc: `You\u2019ve made ${G.profitStreak} profitable sales in a row without a single loss. That\u2019s consistency \u2014 one of the most important traits in business.`,
      emoji: '\uD83C\uDFC6',
      tip: G.profitStreak === 20 ? 'Twenty in a row. That\u2019s not luck \u2014 that\u2019s margin discipline.' : 'Keep it going! Consistent profits compound over time.'
    });
  }
  // Advisor check after sale
  if (!modalVisible) { if (!checkAdvisorTutorial()) checkAdvisorContextual(); }
}

function confirmDoneSelling() {
  G.soldToday = true;
  // If this is the last day, end the game automatically
  if (G.day >= G.days) {
    endGame();
    return;
  }
  render();
}

function travel(destIndex) {
  if (destIndex === G.location) return;
  G.complianceWarning = false;
  G.location = destIndex;
  G.daysAtLocation = 1;
  G.travelCount++;
  const locId = NEIGHBORHOODS[destIndex].id;
  G.locationsVisited[locId] = (G.locationsVisited[locId] || 0) + 1;
  G._willArrive = true;
  advanceDay();
}

function stayDay() {
  G.daysAtLocation++;
  G._willArrive = false;
  advanceDay();
}

function buyTip() {
  const cost = Math.random() < 0.5 ? 5 : 10;
  if (G.cash < cost) return;
  G.cash = Math.round((G.cash - cost)*100)/100;
  G.tipSpend += cost;
  G.tipCount++;
  // Pick random non-current neighborhood
  const others = NEIGHBORHOODS.filter((_,i) => i !== G.location);
  const target = others[Math.floor(Math.random()*others.length)];
  // Check if prices are above average
  let totalSell = 0, count = 0;
  const unlocked = getUnlocked();
  unlocked.forEach(p => {
    NEIGHBORHOODS.forEach(n => { totalSell += G.prices[n.id][p.id].sell; count++; });
  });
  const avgSell = totalSell / count;
  let targetAvg = 0;
  unlocked.forEach(p => { targetAvg += G.prices[target.id][p.id].sell; });
  targetAvg /= unlocked.length;
  const good = targetAvg > avgSell;
  const tips = good
    ? [`${target.emoji} ${target.name} looks promising right now! Demand seems strong there.`, `Word is ${target.name} has good demand today \u2014 customers are buying.`, `A friend says ${target.name} is busy today! Higher demand usually means higher prices.`]
    : [`${target.emoji} ${target.name} seems quiet today. Low demand means lower sell prices.`, `I\u2019d avoid ${target.name} right now \u2014 the market there looks soft.`, `${target.name} doesn\u2019t look great for sales. Demand is down.`];
  const tipText = tips[Math.floor(Math.random()*tips.length)];
  const tipNote = G.tipCount === 1 ? 'Paying for information like this is called market research. It costs money but helps you make better decisions.' : null;
  showModal({ type:'tip', title:`Market Research ($${cost})`, desc:tipText, emoji:'\uD83D\uDCA1', tip:tipNote });
  updateNetWorth();
  render();
}

function purchaseWagonUpgrade() {
  const upgrades = WAGON_UPGRADES[G.mode] || WAGON_UPGRADES.starter;
  const upgrade = upgrades[G.wagonUpgradeIndex];
  if (!upgrade || G.cash < upgrade.cost) return;
  G.cash = Math.round((G.cash - upgrade.cost)*100)/100;
  G.wagonCapacity = upgrade.capacity;
  G.wagonUpgradeIndex++;
  updateNetWorth();
  render();
  showModal({ type:'upgrade', title:'Wagon Upgraded!', desc:`Your capacity is now ${G.wagonCapacity} slots! Spending money to increase your business\u2019s ability to operate is called a capital investment \u2014 you spent cash now to earn more later.`, emoji:'\uD83D\uDED2', tip:'Capital investment is one of the most important decisions in business. Every dollar spent on growth is a dollar not spent on inventory \u2014 that trade-off is called opportunity cost.' });
}

// ===== END GAME =====
function endGame() {
  G.gameOver = true;
  updateNetWorth();
  const pbKey = G.isCareer ? 'career_1_1' : G.mode;
  if (G.netWorth > G.personalBest) {
    G.personalBest = G.netWorth;
    savePersonalBest(pbKey, G.netWorth);
  }
  render();
}

function beginCareerMode() {
  const carryOver = {
    cash: G.cash,
    inventory: { ...G.inventory },
    wagonCapacity: G.wagonCapacity,
    wagonUpgradeIndex: G.wagonUpgradeIndex,
    avgBuyPrice: { ...G.avgBuyPrice }
  };
  startCareerMode(carryOver);
}

function replayCareerSeason() {
  const carryOver = {
    cash: G.cash,
    inventory: { ...G.inventory },
    wagonCapacity: G.wagonCapacity,
    wagonUpgradeIndex: G.wagonUpgradeIndex,
    avgBuyPrice: { ...G.avgBuyPrice }
  };
  startCareerMode(carryOver);
}

function getGrade() {
  const scores = calculateGradeFactors();
  const composite = scores.composite;
  if(composite>=90)return'A+';if(composite>=80)return'A';if(composite>=70)return'B+';
  if(composite>=60)return'B';if(composite>=50)return'C+';if(composite>=40)return'C';
  if(composite>=25)return'D';return'F';
}

function calculateGradeFactors() {
  // === NET WORTH (40%) ===
  // Net worth scoring: measure growth from starting position
  const startingNW = G.netWorthHistory[0] || 50;
  const growthTarget = G.mode === 'starter' ? 100 : 550; // Starter: grow by $100; Full/Career: grow by $550
  const actualGrowth = G.netWorth - startingNW;
  const nwScore = Math.min(100, Math.max(0, (actualGrowth / growthTarget) * 100));

  // === MARGIN DISCIPLINE (25%) ===
  const totalSales = G.sellHistory.length;
  const profitableSales = G.sellHistory.filter(s => !s.isLoss).length;
  const marginScore = totalSales > 0 ? (profitableSales / totalSales) * 100 : 50;

  // === DIVERSIFICATION (15%) ===
  const uniqueProductsSold = Object.keys(G.productsSold).length;
  const maxProducts = G.mode === 'starter' ? Math.min(6, G.unlocked.length) : 6;
  const divRatio = maxProducts > 0 ? uniqueProductsSold / maxProducts : 0;
  const divScore = divRatio >= 0.8 ? 100 : divRatio >= 0.6 ? 80 : divRatio >= 0.4 ? 60 : divRatio >= 0.2 ? 40 : 20;

  // === MARKET RESEARCH (12%) ===
  let researchScore;
  const idealTips = G.mode === 'starter' ? 4 : 6;
  if (G.tipCount === 0) researchScore = 15;
  else if (G.tipCount <= idealTips * 0.5) researchScore = 55;
  else if (G.tipCount <= idealTips * 1.5) researchScore = 100;
  else researchScore = 75; // overspending on research

  // === TRAVEL / MARKET ACCESS (8%) ===
  const uniqueLocations = Object.keys(G.locationsVisited).length;
  const travelScore = uniqueLocations >= 4 ? 100 : uniqueLocations >= 3 ? 80 : uniqueLocations >= 2 ? 50 : 20;

  // === COMPOSITE ===
  const composite = Math.round(
    (nwScore * 0.40) +
    (marginScore * 0.25) +
    (divScore * 0.15) +
    (researchScore * 0.12) +
    (travelScore * 0.08)
  );

  return { composite, nwScore: Math.round(nwScore), marginScore: Math.round(marginScore), divScore: Math.round(divScore), researchScore: Math.round(researchScore), travelScore: Math.round(travelScore) };
}

function getGradeExplanation(scores) {
  const strengths = [];
  const improvements = [];

  if (scores.nwScore >= 70) strengths.push('Strong net worth growth \u2014 your business generated real profit.');
  else if (scores.nwScore >= 40) strengths.push('Decent net worth growth, but there\u2019s room to earn more.');
  else improvements.push('Your net worth stayed low. Focus on finding bigger price differences between neighborhoods.');

  if (scores.marginScore >= 90) strengths.push('Excellent margin discipline \u2014 almost every sale was profitable.');
  else if (scores.marginScore >= 70) strengths.push('Good margin awareness \u2014 most of your sales were profitable.');
  else improvements.push('Too many sales at a loss. Check the sell prices before committing \u2014 protect your profit margins.');

  if (scores.divScore >= 80) strengths.push('Great diversification \u2014 you traded multiple product types, spreading your risk.');
  else if (scores.divScore >= 50) {} // middle ground, skip
  else improvements.push('Try trading more product types. Diversification protects you when one product\u2019s price drops.');

  if (scores.researchScore >= 80) strengths.push('Smart use of market research \u2014 paying for information helped guide your decisions.');
  else if (scores.researchScore <= 20) improvements.push('You never bought market research. Spending a little on information can lead to much better trades.');

  if (scores.travelScore >= 80) strengths.push('Great market access \u2014 you explored multiple neighborhoods to find the best deals.');
  else if (scores.travelScore <= 30) improvements.push('Try visiting more neighborhoods. Different markets have different prices \u2014 that\u2019s where opportunity lives.');

  // Build text
  let text = '';
  if (strengths.length > 0) text += strengths.slice(0, 2).join(' ');
  if (improvements.length > 0) text += (text ? ' ' : '') + improvements[0];
  return text;
}

function checkAdvisorContextual() {
  if (!G || G.gameOver || advisorState.tutorialStep < 3) return false;

  // First saturation
  if (G.daysAtLocation === 3 && !advisorState.shownTips.saturation) {
    advisorState.shownTips.saturation = true;
    showAdvisor(
      `You\u2019ve been in ${NEIGHBORHOODS[G.location].name} for 3 days now. Notice your sell prices are dropping? That\u2019s called <strong>market saturation</strong> \u2014 when you stay too long in one place, supply exceeds demand and prices fall.\n\nTime to move! Different neighborhoods are always looking for what you\u2019re selling.`.replace(/\n/g, '<br>'),
      'Time to move!'
    );
    return true;
  }

  // First wagon upgrade available
  if (!advisorState.shownTips.upgrade) {
    const upgrades = WAGON_UPGRADES[G.mode] || WAGON_UPGRADES.starter;
    const upgrade = upgrades[G.wagonUpgradeIndex];
    if (upgrade && G.netWorth >= upgrade.threshold && G.day >= upgrade.minDay) {
      advisorState.shownTips.upgrade = true;
      showAdvisor(
        `Your business is growing! You\u2019ve unlocked a <strong>wagon upgrade</strong> \u2014 more space means you can carry more products and earn more per trip.\n\nBut here\u2019s the trade-off: the upgrade costs <strong>$${upgrade.cost}</strong>. That\u2019s cash you could spend on inventory instead. In business, this decision is called a <strong>capital investment</strong> \u2014 spending money now to earn more later.`.replace(/\n/g, '<br>'),
        'Interesting!'
      );
      return true;
    }
  }

  // Tip reminder on day 4 if never bought a tip
  if (G.day === 4 && G.tipCount === 0 && !advisorState.shownTips.tipReminder) {
    advisorState.shownTips.tipReminder = true;
    showAdvisor(
      'Quick tip: see the <strong>Market Research</strong> button on the Travel tab? For a small fee, I may be able to find out which neighborhoods have good prices right now.<br><br>It\u2019s not a guarantee \u2014 but paying for information before making a big decision is called <strong>market research</strong>, and it\u2019s one of the smartest investments you can make.',
      'Good to know!'
    );
    return true;
  }

  // Revenue vs Profit explanation after 3+ sales
  if (G.sellHistory.length >= 3 && !advisorState.shownTips.revenueProfit) {
    advisorState.shownTips.revenueProfit = true;
    const rev = G.totalRevenue.toFixed(2);
    const startNW = G.netWorthHistory[0] || 50;
    const profit = (G.netWorth - startNW).toFixed(2);
    showAdvisor(
      'Let me explain something important. Your <strong>revenue</strong> is $' + rev + ' \u2014 that\u2019s the total money that came in from sales. But revenue is NOT the same as profit.<br><br>Your <strong>profit</strong> is $' + profit + ' \u2014 that\u2019s what\u2019s left after subtracting what you paid for the products. A business can have high revenue and still make very little profit if their costs are too high.',
      'That makes sense!'
    );
    return true;
  }

  // Opportunity cost explanation when wagon is more than 70% full
  if (wagonPercent() > 70 && !advisorState.shownTips.opportunityCost && G.day >= 3) {
    advisorState.shownTips.opportunityCost = true;
    showAdvisor(
      'Your wagon is getting full! Every item you put in takes a slot that could go to something else. If you fill up on lemonade, you can\u2019t carry toys \u2014 and toys might have a bigger profit margin.<br><br>This trade-off is called <strong>opportunity cost</strong> \u2014 what you give up when you choose one option over another. Smart business owners think about what they\u2019re saying \u201Cno\u201D to every time they say \u201Cyes.\u201D',
      'I\u2019ll choose wisely!'
    );
    return true;
  }

  return false;
}

    ${G.soldToday && G.mode === 'full' && G.boughtHere ? '<div class="banner banner-info">\uD83D\uDE97 Stocked up! Travel to a new neighborhood to sell.</div>' : ''}
    ${G.soldToday && G.mode === 'starter' ? '<div class="banner banner-warn">\u2705 Done selling. Travel or Stay to advance.</div>' : ''}
    ${G.daysAtLocation >= 3 ? `<div class="banner banner-warn">\uD83D\uDCC9 Market saturation: ${G.daysAtLocation} days here. Too much supply \u2014 sell prices dropping!</div>` : ''}
    ${upgrade && !G.soldToday ? `<div class="upgrade-card"><h3>\uD83D\uDED2 Capital Investment Opportunity!</h3><p class="text-muted">${upgrade.label}: ${G.wagonCapacity} \u2192 ${upgrade.capacity} slots capacity</p><button class="btn btn-sell" onclick="purchaseWagonUpgrade()" ${G.cash < upgrade.cost ? 'disabled' : ''}>Invest $${upgrade.cost}</button></div>` : ''}
    ${G.mode === 'starter' ? renderProgressTrack(unlocked) : ''}
    <div class="tabs">
      ${['buy','sell','travel','inventory','stats'].map(t => `<div class="tab ${G.activeTab===t?'active':''}" onclick="G.activeTab='${t}';render()">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('')}
    </div>
    <div class="tab-content">${renderTab(unlocked)}</div>
  `;
}

function renderProgressTrack(unlocked) {
  return `<div class="progress-track">${PRODUCTS.map(p => {
    const isUnlocked = unlocked.some(u=>u.id===p.id);
    const isCurrent = p.unlockDay === G.day;
    return `<div class="progress-dot ${isUnlocked?'unlocked':''} ${isCurrent?'current':''}" title="${p.emoji} ${p.name}${isUnlocked?' (unlocked)':` (Day ${p.unlockDay})`}"></div>`;
  }).join('')}</div>`;
}

function renderTab(unlocked) {
  switch(G.activeTab) {
    case 'buy': return renderBuyTab(unlocked);
    case 'sell': return renderSellTab(unlocked);
    case 'travel': return renderTravelTab();
    case 'inventory': return renderItemsTab();
    case 'stats': return renderStatsTab();
  }
}

function renderBuyTab(unlocked) {
  // Starter Mode: lock buying after any sale
  if (G.mode === 'starter' && (G.hasSoldThisTurn || G.soldToday)) {
    return '<div class="text-center mt-2"><h3>\uD83D\uDD12 Buying locked</h3><p class="text-muted mt-2">You\'ve already sold today. Travel or Stay Another Day to buy again tomorrow.</p></div>';
  }
  // Full Market Mode: lock buying while actively selling (between first sale and Done Selling)
  // But reopen after Done Selling so player can restock before traveling
  if (G.mode === 'full' && G.hasSoldThisTurn && !G.soldToday) {
    return '<div class="text-center mt-2"><h3>\uD83D\uDD12 Finish selling first</h3><p class="text-muted mt-2">Click "Done Selling" on the Sell tab. Then you can buy new stock before traveling.</p></div>';
  }
  const loc = NEIGHBORHOODS[G.location].id;
  const free = wagonFree();
  let html = '';
  html += `<div class="banner" style="background:#f5ede0;color:#6b5b4a;border:1px solid #e0d6c2;font-size:.72rem">\uD83D\uDED2 Wagon space: ${free} of ${G.wagonCapacity} slots available</div>`;
  html += unlocked.map(p => {
    const price = G.prices[loc][p.id].buy;
    const maxAfford = Math.floor(G.cash / price);
    const maxBuy = Math.min(maxAfford, free);
    return `<div class="card">
      <div class="card-header">
        <span class="card-title">${p.emoji} ${p.name}</span>
        <span class="price">$${price.toFixed(2)}</span>
      </div>
      <div class="flex-between">
        <span class="text-muted">Can buy: ${maxBuy} ${maxBuy < maxAfford ? '(wagon full)' : maxBuy < free ? '(limited by cash)' : ''}</span>
        <div>
          <button class="btn btn-primary btn-sm" onclick="buyProduct('${p.id}',1)" ${maxBuy<1?'disabled':''}>+1</button>
          <button class="btn btn-primary btn-sm" onclick="buyProduct('${p.id}',5)" ${maxBuy<5?'disabled':''}>+5</button>
          <button class="btn btn-primary btn-sm" onclick="buyProduct('${p.id}',10)" ${maxBuy<10?'disabled':''}>+10</button>
          <button class="btn btn-primary btn-sm" onclick="buyProduct('${p.id}',${maxBuy})" ${maxBuy<1?'disabled':''}>All</button>
        </div>
      </div>
    </div>`;
  }).join('');
  return html;
}

function renderSellTab(unlocked) {
  // Already confirmed done selling
  if (G.soldToday) {
    if (G.mode === 'full') {
      return '<div class="text-center mt-2"><h3>\u2705 Done selling for today</h3><p class="text-muted mt-2">Travel to a new neighborhood to buy and sell again.</p></div>';
    }
    return '<div class="text-center mt-2"><h3>\u2705 Done selling for today</h3><p class="text-muted mt-2">Travel to a new neighborhood or Stay Another Day to continue.</p></div>';
  }
  // Full Market Mode: must have traveled to sell
  if (G.mode === 'full' && !G.arrivedViaTravel) {
    const hasInv = totalInventory() > 0;
    if (!hasInv) return '<div class="text-center mt-2"><h3>No inventory to sell</h3><p class="text-muted mt-2">Buy products on the Buy tab, then travel to a new neighborhood to sell them.</p></div>';
    return '<div class="text-center mt-2"><h3>\uD83D\uDD12 Must travel to sell</h3><p class="text-muted mt-2">You can\'t sell where you bought. Travel to a different neighborhood first!</p><p class="text-muted" style="margin-top:8px">\uD83D\uDCA1 Use Market Research on the Travel tab to find out where prices are good.</p></div>';
  }
  const loc = NEIGHBORHOODS[G.location].id;
  const hasInv = unlocked.some(p => G.inventory[p.id] > 0);
  if (!hasInv && !G.hasSoldThisTurn) return '<div class="text-center mt-2"><h3>No inventory to sell</h3><p class="text-muted mt-2">Visit the Buy tab to stock up!</p></div>';
  if (!hasInv && G.hasSoldThisTurn) return `<div class="text-center mt-2"><h3>All sold! \uD83C\uDF89</h3><p class="text-muted mt-2">${G.day >= G.days ? 'Final day! Confirm to see your market report.' : 'You\'ve sold everything. Confirm you\'re done, then travel.'}</p><button class="btn btn-primary btn-lg" style="width:100%;margin-top:10px" onclick="confirmDoneSelling()">${G.day >= G.days ? '\uD83D\uDCCA Close the Books' : '\u2705 Done Selling for Today'}</button></div>`;
  let html = '';
  if (!G.hasSoldThisTurn) html += '<div class="banner" style="background:#f5ede0;color:#6b5b4a;border:1px solid #e0d6c2;font-size:.72rem">\uD83D\uDCCB You get one selling session per day. Sell as many product types as you want, then click Done Selling.</div>';
  if (G.hasSoldThisTurn) html += '<div class="banner banner-info">You can sell more products, or click Done Selling when finished.</div>';
  html += unlocked.filter(p => G.inventory[p.id] > 0).map(p => {
    const price = G.prices[loc][p.id].sell;
    const qty = G.inventory[p.id];
    const avgCost = G.avgBuyPrice[p.id] || 0;
    const isLoss = avgCost > 0 && price < avgCost;
    const marginPct = avgCost > 0 ? Math.round(((price - avgCost) / avgCost) * 100) : 0;
    return `<div class="card" ${isLoss ? 'style="border-left:3px solid #b83a2a"' : ''}>
      <div class="card-header">
        <span class="card-title">${p.emoji} ${p.name} (${qty})</span>
        <span class="price sell">$${price.toFixed(2)}</span>
      </div>
      <div class="flex-between" style="margin-bottom:4px">
        <span class="text-muted" style="font-size:.72rem">Avg cost: $${avgCost.toFixed(2)} \u2022 Margin: <span style="color:${isLoss?'#b83a2a':'#5a7a4a'};font-weight:700">${marginPct}%</span></span>
        ${isLoss ? '<span style="color:#b83a2a;font-size:.72rem;font-weight:700">\u26A0\uFE0F Loss</span>' : ''}
      </div>
      <div style="display:flex;gap:4px;justify-content:flex-end">
        <button class="btn btn-sell btn-sm" onclick="sellProduct('${p.id}',1)" ${qty<1?'disabled':''}>Sell 1</button>
        <button class="btn btn-sell btn-sm" onclick="sellProduct('${p.id}',5)" ${qty<5?'disabled':''}>Sell 5</button>
        <button class="btn btn-sell btn-sm" onclick="sellProduct('${p.id}',10)" ${qty<10?'disabled':''}>Sell 10</button>
        <button class="btn btn-sell btn-sm" onclick="sellProduct('${p.id}',${qty})">Sell All</button>
      </div>
    </div>`;
  }).join('');
  if (G.hasSoldThisTurn) html += `<button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="confirmDoneSelling()">${G.day >= G.days ? '\uD83D\uDCCA Close the Books' : '\u2705 Done Selling for Today'}</button>`;
  return html;
}

function renderTravelTab() {
  let html = '<h3 class="mb-2">Neighborhoods</h3>';
  if (G.mode === 'full' && totalInventory() > 0 && !G.arrivedViaTravel) {
    html += '<div class="banner banner-info">📦 Travel to a new neighborhood to sell your inventory!</div>';
  }
  NEIGHBORHOODS.forEach((n, i) => {
    const isCurrent = i === G.location;
    html += `<div class="card">
      <div class="card-header">
        <span class="card-title">${n.emoji} ${n.name} ${isCurrent ? '📍' : ''}</span>
        ${!isCurrent ? `<button class="btn btn-travel btn-sm" onclick="travel(${i})">Travel</button>` : '<span class="badge badge-new">You are here</span>'}
      </div>
      <p class="text-muted">${n.desc}</p>
    </div>`;
  });
  html += `<div style="display:flex;gap:6px;margin-top:8px">
    <button class="btn btn-travel" onclick="stayDay()" style="flex:1">Stay Another Day</button>
    <button class="btn btn-tip" onclick="buyTip()" ${G.cash < 5 ? 'disabled' : ''}>Market Research \uD83D\uDCA1</button>
  </div>`;
  if (G.mode === 'full') html += '<p class="text-muted mt-2 text-center">⚠️ Staying lets you buy, but you must travel to sell.</p>';
  if (G.tipCount > 0) html += `<p class="text-muted mt-2 text-center">Tips purchased: ${G.tipCount} ($${G.tipSpend} spent)</p>`;
  return html;
}

function renderItemsTab() {
  return `<div class="flex-between mb-2"><h3>Inventory</h3><span class="text-muted">${totalInventory()} / ${G.wagonCapacity} slots</span></div>
  <div class="wagon-bar" style="margin-bottom:8px"><div class="wagon-fill ${wagonPercent()>90?'full':wagonPercent()>70?'warning':''}" style="width:${Math.min(wagonPercent(),100)}%"></div></div>
  <div class="inv-grid">${PRODUCTS.filter(p => G.unlocked.includes(p.id)).map(p => `<div class="inv-item">
    <div class="emoji">${p.emoji}</div>
    <div class="name">${p.name}</div>
    <div class="count">${G.inventory[p.id]}</div>
  </div>`).join('')}</div>`;
}

function renderStatsTab() {
  const pbDiff = G.netWorth - G.personalBest;
  const pbClass = pbDiff >= 0 ? 'color:#5a7a4a' : 'color:#b83a2a';
  const startingNW = G.netWorthHistory[0] || 50;
  const totalProfit = G.netWorth - startingNW;
  // Calculate average margin
  let totalMarginWeighted = 0, totalSoldUnits = 0;
  G.sellHistory.forEach(s => {
    if (s.avgCost && s.avgCost > 0) {
      const marginPct = ((s.price - s.avgCost) / s.avgCost) * 100;
      totalMarginWeighted += marginPct * s.qty;
      totalSoldUnits += s.qty;
    }
  });
  const avgMargin = totalSoldUnits > 0 ? Math.round(totalMarginWeighted / totalSoldUnits) : 0;
  return `${G.isCareer ? '<div class="banner banner-info" style="margin-bottom:8px">\uD83C\uDF1F Career Mode \u2022 Level ' + G.careerLevel + ': The Hustle</div>' : ''}
  <h3>My Stats</h3>
  <div class="end-stat"><span>Net Worth</span><span style="font-weight:800">$${G.netWorth.toFixed(2)}</span></div>
  <div class="end-stat"><span>Cash on Hand</span><span>$${G.cash.toFixed(2)}</span></div>
  <div class="end-stat"><span>Total Profit</span><span style="color:${totalProfit>=0?'#5a7a4a':'#b83a2a'};font-weight:700">${totalProfit>=0?'+':''}$${totalProfit.toFixed(2)}</span></div>
  <div class="end-stat"><span>Total Revenue</span><span>$${G.totalRevenue.toFixed(2)}</span></div>
  <div class="end-stat"><span>Avg Profit Margin</span><span style="color:${avgMargin>=0?'#5a7a4a':'#b83a2a'};font-weight:700">${avgMargin}%</span></div>
  <div class="end-stat"><span>Sales at a Loss</span><span style="${G.lossCount>0?'color:#b83a2a':''}">${G.lossCount > 0 ? G.lossCount + ' (' + G.lossTotalUnits + ' units)' : 'None'}</span></div>
  ${G.isCareer ? '<div class="end-stat"><span>Profit Streak</span><span style="font-weight:700">\uD83D\uDD25 ' + G.profitStreak + (G.bestProfitStreak > G.profitStreak ? ' (best: ' + G.bestProfitStreak + ')' : '') + '</span></div>' : ''}
  <div class="end-stat"><span>Wagon</span><span>${totalInventory()} / ${G.wagonCapacity}</span></div>
  <div class="end-stat"><span>Travels</span><span>${G.travelCount}</span></div>
  <div class="end-stat"><span>Market Research</span><span>${G.tipCount} tips ($${G.tipSpend})</span></div>
  <div class="end-stat"><span>Personal Best</span><span>$${G.personalBest.toFixed(2)}</span></div>
  <div class="end-stat"><span>vs. Best</span><span style="${pbClass};font-weight:800">${pbDiff>=0?'+':''}$${pbDiff.toFixed(2)}</span></div>
  <div class="chart-container"><canvas id="sparkline" height="120"></canvas></div>
  ${G.encounters.length > 0 ? '<h3 class="mt-2">Encounters</h3>' + G.encounters.map(e => `<div class="encounter"><span class="emoji">${e.emoji}</span><span><strong>${e.name}</strong> \u2014 ${e.eventName} (Day ${e.day})</span></div>`).join('') : ''}`;
}

function submitNames() {
  const pName = (document.getElementById('playerNameInput') || {}).value || '';
  const bName = (document.getElementById('bizNameInput') || {}).value || '';
  const tosChecked = document.getElementById('tosCheckbox') && document.getElementById('tosCheckbox').checked;
  if (!pName.trim() || !bName.trim()) {
    alert('Please enter both your name and a business name.');
    return;
  }
  if (!tosChecked) {
    alert('Please read and accept the Terms of Service to continue.');
    return;
  }
  playerInfo.playerName = pName.trim();
  playerInfo.businessName = bName.trim();
  render();
}

// ===== SKILL CALIBRATION =====
function startCalibration(mode) {
  if (mode === 'starter') {
    advisorState = { tutorialStep: 0, shownTips: {} };
    newGame('starter');
    setTimeout(function() { checkAdvisorTutorial(); }, 100);
    return;
  }
  // Full Market: show Maeve intro first, then calibration
  advisorState = { tutorialStep: 0, shownTips: {} };
  var bizName = playerInfo.businessName || 'your business';
  var app = document.getElementById('app');
  app.innerHTML = '<div style="padding:16px">' +
    '<div class="advisor-modal" style="max-width:100%;box-shadow:none;margin:0 auto">' +
    '<div class="advisor-header">' +
    '<div class="advisor-avatar"><img src="' + MAEVE_INTRO + '" style="width:48px;height:48px;border-radius:50%;object-fit:cover"></div>' +
    '<div><div class="advisor-name">Maeve</div>' +
    '<div class="advisor-title">Your Business Advisor</div></div></div>' +
    '<div class="advisor-body">Welcome to <strong>' + bizName + '</strong>! I\u2019m Maeve, and I\u2019ll be your business advisor.' +

    '<br><br>Your choice helps me adjust the game to your experience level. Ready?</div>' +
    '<div class="modal-buttons"><button class="btn btn-primary btn-lg" onclick="showCalibrationScreen()">Show me the scenario! \u2192</button></div>' +

}

function finishCalibration(mode, choice) {
  let skill = 0;
  if (choice === 'mix') skill = 0.3;
  if (choice === 'save') skill = 0.5;
  if (choice === 'cookies_all') skill = 0.2;
  if (choice === 'lemonade_all') skill = 0.0;
  advisorState = { tutorialStep: 0, shownTips: {} };
  newGame(mode);
  G.calSkill = skill;
  G.adaptive.skillScore = skill;
  G.adaptive.volatilityMult = 1.0 + (skill * 0.2);
  setTimeout(function() { checkAdvisorTutorial(); }, 100);
}
