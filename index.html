function renderEnd(app) {
  const grade = getGrade();
  const scores = calculateGradeFactors();
  const gradeExpl = getGradeExplanation(scores);
  const gradeClass = grade.startsWith('A')?'grade-A':grade.startsWith('B')?'grade-B':grade.startsWith('C')?'grade-C':grade.startsWith('D')?'grade-D':'grade-F';
  const lessons = generateLessons();
  // Calculate margin stats
  let totalMarginWeighted = 0, totalSoldUnits = 0;
  G.sellHistory.forEach(s => {
    if (s.avgCost && s.avgCost > 0) {
      const marginPct = ((s.price - s.avgCost) / s.avgCost) * 100;
      totalMarginWeighted += marginPct * s.qty;
      totalSoldUnits += s.qty;
    }
  });
  const avgMargin = totalSoldUnits > 0 ? Math.round(totalMarginWeighted / totalSoldUnits) : 0;
  const startingNW = G.netWorthHistory[0] || 50;
  const totalProfit = G.netWorth - startingNW;
  // Antagonist summary
  const antCounts = {};
  G.encounters.forEach(e => {
    const key = e.emoji + ' ' + e.name;
    if (!antCounts[key]) antCounts[key] = { emoji:e.emoji, name:e.name, title:e.title, count:0 };
    antCounts[key].count++;
  });
  // Grade bar helper
  function bar(score) {
    const color = score >= 70 ? '#5a7a4a' : score >= 40 ? '#b85c2a' : '#b83a2a';
    return `<div style="display:flex;align-items:center;gap:6px"><div style="flex:1;background:#e0d6c2;border-radius:4px;height:8px;overflow:hidden"><div style="width:${score}%;height:100%;background:${color};border-radius:4px"></div></div><span style="font-size:.72rem;font-weight:700;color:${color};min-width:28px;text-align:right">${score}</span></div>`;
  }
  
  app.innerHTML = `<div class="end-screen">
    <h1>\uD83D\uDCD3 Month-End Market Report</h1>
    ${playerInfo.businessName ? `<p style="text-align:center;font-family:'Patrick Hand',cursive;font-size:1.1rem;color:#5a4a3a;margin-bottom:2px">${playerInfo.businessName}</p>` : ''}
    ${playerInfo.playerName ? `<p style="text-align:center;font-size:.75rem;color:#8a7a68;margin-bottom:8px">Owner: ${playerInfo.playerName}</p>` : ''}
    <div class="grade-display ${gradeClass}">${grade}</div>
    <div class="lesson-card" style="text-align:center;margin-bottom:10px">${gradeExpl}</div>

    <h3 style="margin:8px 0 4px">Grade Breakdown</h3>
    <div class="card" style="padding:10px">
      <div style="margin-bottom:6px"><div class="flex-between" style="margin-bottom:2px"><span style="font-size:.75rem;font-weight:700">Net Worth Growth</span><span style="font-size:.68rem;color:#8a7a68">40%</span></div>${bar(scores.nwScore)}</div>
      <div style="margin-bottom:6px"><div class="flex-between" style="margin-bottom:2px"><span style="font-size:.75rem;font-weight:700">Margin Discipline</span><span style="font-size:.68rem;color:#8a7a68">25%</span></div>${bar(scores.marginScore)}</div>
      <div style="margin-bottom:6px"><div class="flex-between" style="margin-bottom:2px"><span style="font-size:.75rem;font-weight:700">Diversification</span><span style="font-size:.68rem;color:#8a7a68">15%</span></div>${bar(scores.divScore)}</div>
      <div style="margin-bottom:6px"><div class="flex-between" style="margin-bottom:2px"><span style="font-size:.75rem;font-weight:700">Market Research</span><span style="font-size:.68rem;color:#8a7a68">12%</span></div>${bar(scores.researchScore)}</div>
      <div><div class="flex-between" style="margin-bottom:2px"><span style="font-size:.75rem;font-weight:700">Market Access</span><span style="font-size:.68rem;color:#8a7a68">8%</span></div>${bar(scores.travelScore)}</div>
    </div>

    <h3 style="margin:10px 0 4px">Performance</h3>
    <div class="end-stat"><span>Final Net Worth</span><span style="font-weight:800">$${G.netWorth.toFixed(2)}</span></div>
    <div class="end-stat"><span>Total Profit</span><span style="color:${totalProfit>=0?'#5a7a4a':'#b83a2a'};font-weight:800">${totalProfit>=0?'+':''}$${totalProfit.toFixed(2)}</span></div>
    <div class="end-stat"><span>Total Revenue</span><span>$${G.totalRevenue.toFixed(2)}</span></div>
    <div class="end-stat"><span>Avg Profit Margin</span><span style="color:${avgMargin>=0?'#5a7a4a':'#b83a2a'};font-weight:700">${avgMargin}%</span></div>
    <div class="end-stat"><span>Products Traded</span><span>${Object.keys(G.productsSold).length} of ${G.mode==='starter'?G.unlocked.length:6}</span></div>
    <div class="end-stat"><span>Sales at a Loss</span><span style="${G.lossCount > 0 ? 'color:#b83a2a;font-weight:800' : ''}">${G.lossCount > 0 ? G.lossCount + ' (' + G.lossTotalUnits + ' units)' : 'None \u2014 nice!'}</span></div>
    <div class="end-stat"><span>Market Research</span><span>${G.tipCount} tips ($${G.tipSpend})</span></div>
    <div class="end-stat"><span>Neighborhoods Visited</span><span>${Object.keys(G.locationsVisited).length} of 4</span></div>
    <div class="end-stat"><span>Total Travels</span><span>${G.travelCount}</span></div>
    <div class="end-stat"><span>Final Wagon</span><span>${G.wagonCapacity} slots</span></div>
    <div class="end-stat"><span>Personal Best</span><span>$${G.personalBest.toFixed(2)}</span></div>
    <div class="end-stat"><span>Mode</span><span>${G.isCareer ? 'Career Mode 1-1: The Hustle (30 days)' : G.mode==='starter'?'Starter (15 days)':'Full Market (30 days)'}</span></div>
    ${G.isCareer ? '<div class="end-stat"><span>Best Profit Streak</span><span>\uD83D\uDD25 ' + G.bestProfitStreak + ' in a row</span></div>' : ''}
    
    <div class="chart-container"><canvas id="endChart" height="140"></canvas></div>
    
    ${Object.keys(antCounts).length > 0 ? `<h2>Who You Met</h2>${Object.values(antCounts).map(a => `<div class="who-met"><span class="emoji">${a.emoji}</span><div><strong>${a.name}</strong> \u2014 ${a.title}<br><span class="text-muted">Appeared ${a.count} time${a.count>1?'s':''}</span></div></div>`).join('')}` : ''}
    
    <h2 style="margin-top:12px">What You Learned</h2>
    ${lessons.map(l => `<div class="lesson-card">${l}</div>`).join('')}
    
    <h2 style="margin-top:12px">Words You Used</h2>
    ${generateVocabRecap().map(v => `<div class="card" style="padding:8px 10px;margin-bottom:5px"><div class="flex-between"><span style="font-weight:700;font-size:.82rem;color:#2B4C7E">${v.term}</span>${v.isNew ? '<span class="badge badge-new">NEW</span>' : ''}</div><p style="font-size:.76rem;color:#5a4a3a;margin-top:3px;line-height:1.4">${v.def}</p></div>`).join('')}
    
    ${G.isCareer && (grade === 'A+' || grade === 'A') ? '<div class="upgrade-card"><h3>\uD83C\uDF1F Level Complete!</h3><p class="text-muted">You earned an A in Career Mode 1-1. Level 1-2: Wheels is coming soon!</p></div>' : ''}
    ${G.isCareer && grade !== 'A+' && grade !== 'A' ? '<div class="lesson-card" style="text-align:center">You need an A grade to advance. Your current resources carry forward \u2014 try another season!</div>' : ''}
    ${!G.isCareer && G.mode === 'full' && (grade === 'A+' || grade === 'A') ? '<div class="upgrade-card" style="cursor:pointer" onclick="beginCareerMode()"><h3>\uD83C\uDF1F Career Mode Unlocked!</h3><p class="text-muted">You\u2019ve proven yourself. Ready to go further? Your cash, inventory, and wagon carry forward.</p><button class="btn btn-primary" style="margin-top:6px">Continue to Career Mode \u2192</button></div>' : ''}
    ${G.isCareer ? '<button class="btn btn-primary btn-lg" style="width:100%;margin-top:10px" onclick="replayCareerSeason()">Play Another Season</button>' : ''}
    <button class="btn ${G.isCareer ? 'btn-sell' : 'btn-primary btn-lg'}" style="width:100%;margin-top:8px" onclick="G={};render()">Back to Menu</button>
    <div class="copyright-footer">\u00A9 2026 [Owner Name]. All rights reserved.</div>
  </div>`;
  
  setTimeout(drawEndChart, 100);
}

function generateVocabRecap() {
  const vocab = [];
  const startNW = G.netWorthHistory[0] || 50;

  // Profit — always encountered if any sale was made
  if (G.sellHistory.length > 0) {
    const totalProfit = G.netWorth - startNW;
    vocab.push({ term: 'Profit', def: `The money you keep after subtracting costs. You ${totalProfit >= 0 ? 'earned' : 'lost'} $${Math.abs(totalProfit).toFixed(2)} this session.`, isNew: G.sellHistory.length <= 5 });
  }

  // Profit Margin — if any sale was made
  if (G.sellHistory.length > 0) {
    let totalMarginW = 0, totalUnits = 0;
    G.sellHistory.forEach(s => { if (s.avgCost > 0) { totalMarginW += ((s.price - s.avgCost) / s.avgCost) * 100 * s.qty; totalUnits += s.qty; }});
    const avgM = totalUnits > 0 ? Math.round(totalMarginW / totalUnits) : 0;
    vocab.push({ term: 'Profit Margin', def: `The difference between your cost and sell price. Your average margin was ${avgM}%.`, isNew: G.sellHistory.length <= 3 });
  }

  // Supply and Demand — if cold snap or supply shortage happened
  if (G.encounters.some(e => e.eventName && (e.eventName.includes('Cold Snap') || e.eventName.includes('Supply Shortage')))) {
    vocab.push({ term: 'Supply & Demand', def: 'When more people want something (demand up), prices rise. When there\u2019s too much of something (supply up), prices fall.', isNew: true });
  }

  // Market Saturation — if player stayed 3+ days anywhere
  if (advisorState.shownTips.saturation) {
    vocab.push({ term: 'Market Saturation', def: 'When you stay in one place too long, there\u2019s too much supply and prices drop. You experienced this firsthand.', isNew: true });
  }

  // Market Research — if tips were purchased
  if (G.tipCount > 0) {
    vocab.push({ term: 'Market Research', def: `Paying for information before committing money. You spent $${G.tipSpend} on ${G.tipCount} tip${G.tipCount > 1 ? 's' : ''}.`, isNew: G.tipCount <= 2 });
  }

  // Capital Investment — if wagon was upgraded
  if (G.wagonCapacity > 50) {
    vocab.push({ term: 'Capital Investment', def: `Spending money now to grow your business later. You upgraded your wagon to ${G.wagonCapacity} slots.`, isNew: true });
  }

  // Competition — if Eddie appeared
  if (G.encounters.some(e => e.eventName && (e.eventName.includes('Set Up Shop') || e.eventName.includes('Bought All') || e.eventName.includes('Stole')))) {
    vocab.push({ term: 'Competition', def: 'Other businesses selling the same products. Slick Eddie showed you how competitors affect your prices and supply.', isNew: true });
  }

  // Diversification — if player sold 3+ product types
  if (Object.keys(G.productsSold).length >= 3) {
    vocab.push({ term: 'Diversification', def: `Spreading risk across different products. You traded ${Object.keys(G.productsSold).length} product types this session.`, isNew: true });
  }

  // Revenue — always if sales happened
  if (G.totalRevenue > 0) {
    vocab.push({ term: 'Revenue', def: `Total money from sales before subtracting costs. Your revenue was $${G.totalRevenue.toFixed(2)}.`, isNew: G.sellHistory.length <= 4 });
  }

  // Opportunity Cost — if wagon was ever more than 70% full
  if (advisorState.shownTips.opportunityCost) {
    vocab.push({ term: 'Opportunity Cost', def: 'What you give up when you choose one thing over another. Every item in your wagon took a slot that could hold something else.', isNew: true });
  }

  // Compliance — if Inspector Davis appeared
  if (G.encounters.some(e => e.eventName && (e.eventName.includes('Inspection') || e.eventName.includes('Compliance') || e.eventName.includes('Failed')))) {
    vocab.push({ term: 'Compliance', def: 'Following the rules set by regulators. Inspector Davis taught you that violations cost time and money.', isNew: true });
  }

  // External Risk — if Mother Nature appeared
  if (G.encounters.some(e => e.eventName && (e.eventName.includes('Thunderstorm') || e.eventName.includes('Cold Snap') || e.eventName.includes('Supply Shortage')))) {
    vocab.push({ term: 'External Risk', def: 'Events outside your control that affect your business. Storms, cold snaps, and supply shortages are all external risks.', isNew: true });
  }

  // Loss — if any loss sale occurred
  if (G.lossCount > 0) {
    vocab.push({ term: 'Loss', def: `Selling for less than you paid. You had ${G.lossCount} transaction${G.lossCount > 1 ? 's' : ''} where your margin went negative.`, isNew: true });
  }

  // Cash Reserves — if player got fined or hit by storm with low cash
  if (G.encounters.some(e => e.eventName && (e.eventName.includes('Fine') || e.eventName.includes('Thunderstorm')))) {
    vocab.push({ term: 'Cash Reserves', def: 'Money kept on hand for emergencies instead of spending everything on inventory. Your safety net against the unexpected.', isNew: true });
  }

  // Arbitrage — if player had high net worth growth
  const growth = G.netWorth - startNW;
  if (growth > startNW * 2) {
    vocab.push({ term: 'Arbitrage', def: 'Buying cheap in one place and selling for more somewhere else. Your net worth growth shows you found profitable price differences.', isNew: true });
  }

  // Return max 6, prioritizing NEW terms
  const newTerms = vocab.filter(v => v.isNew);
  const oldTerms = vocab.filter(v => !v.isNew);
  const selected = [...newTerms, ...oldTerms].slice(0, 6);
  return selected;
}

function generateLessons() {
  const lessons = [];
  const highNWThreshold = G.mode === 'starter' ? 120 : (G.netWorthHistory[0] || 50) * 3;
  if (G.netWorth > highNWThreshold) lessons.push('\uD83D\uDCB0 You mastered the core of business: buy at a low cost, sell at a higher price, and protect your profit margin. That\u2019s called arbitrage \u2014 finding price differences across markets.');
  if (G.travelCount < (G.days * 0.3)) lessons.push('\uD83D\uDDFA\uFE0F Move around! Different neighborhoods have different prices \u2014 that\u2019s geographic price variance. Traders who travel find better deals.');
  if (G.travelCount >= (G.days * 0.6)) lessons.push('\uD83D\uDDFA\uFE0F Great mobility! Moving between markets helped you find the best prices. In business, this is called market access.');
  if (G.tipCount === 0) lessons.push('\uD83D\uDCA1 Paying for information about a market before committing your money is called market research. Next time, try buying tips \u2014 sometimes paying for information saves you money!');
  if (G.tipCount > 0) lessons.push(`\uD83D\uDCA1 You spent $${G.tipSpend} on market research. In real business, information has value \u2014 and your research helped guide your decisions.`);
  if (G.lossCount > 0) lessons.push(`\uD83D\uDCC9 You sold ${G.lossTotalUnits} items below cost across ${G.lossCount} transaction${G.lossCount>1?'s':''}. Each time you sell for less than you paid, your profit margin goes negative. In real business, consistent losses signal a problem \u2014 investors and lenders watch this closely.`);
  if (G.lossCount === 0 && G.sellHistory.length > 0) lessons.push('\uD83D\uDCC8 You never sold below cost \u2014 every trade had a positive profit margin. That\u2019s strong margin discipline, and it\u2019s exactly what investors look for.');
  if (G.encounters.some(e => e.name === 'Mrs. Crawley')) {
    if (eventChoices.crawley1 === 0) {
      lessons.push('\uD83D\uDC75 You helped Mrs. Crawley and earned goodwill \u2014 the 20% sell bonus proved that investing in community relationships pays off. In business, your reputation is one of your most valuable assets.');
    } else if (eventChoices.crawley1 === 1 && eventChoices.crawley1_fined) {
      lessons.push('\uD83D\uDC75 You ignored Mrs. Crawley and paid a $5 fine. Next time, consider that a $3 investment in community relations would have cost less AND earned you a sell bonus. Managing relationships is a business skill.');
    } else if (eventChoices.crawley1 === 1 && eventChoices.crawley1_fined === false) {
      lessons.push('\uD83D\uDC75 You ignored Mrs. Crawley and got lucky \u2014 no fine this time. But it was a gamble. The  favor would have been a guaranteed win: lower cost AND a sell bonus. In business, relying on luck is not a strategy.');
    } else {
      lessons.push('\uD83D\uDC75 Mrs. Crawley represents regulation and community relations. In real business, managing your relationship with the community is as important as managing your money.');
    }
  }
  if (G.encounters.some(e => e.name === 'Inspector Davis')) {
    if (eventChoices.davis2 === 0) {
      lessons.push('\uD83D\uDD75\uFE0F You fixed the compliance issue on the spot for $5 \u2014 that\u2019s proactive compliance. It saved you $5 compared to the deferred fine. Smart business owners address problems early.');
    } else if (eventChoices.davis2 === 1) {
      lessons.push('\uD83D\uDD75\uFE0F Inspector Davis gave you a warning and you chose to defer. In business, deferred problems usually cost more than immediate fixes. Proactive compliance is almost always cheaper.');
    } else {
      lessons.push('\uD83D\uDD75\uFE0F Inspector Davis represents regulatory compliance. When regulators give warnings, smart business owners listen and act fast to avoid penalties.');
    }
  }
  if (G.encounters.some(e => e.name === 'Slick Eddie')) {
    if (eventChoices.eddie1 === 0) {
      lessons.push('\uD83D\uDE0F You chose to compete with Slick Eddie at lower prices. Staying in a competitive market means lower margins, but you kept your customers and your position. That takes guts.');
    } else if (eventChoices.eddie1 === 1) {
      lessons.push('\uD83D\uDE0F You paid Eddie to leave \u2014 that\u2019s a competitive strategy called buying out a competitor. It cost cash, but restored your full profit margins. Smart businesses weigh the cost of competition against the cost of removing it.');
    } else {
      lessons.push('\uD83D\uDE0F Slick Eddie represents competition. Competitors can affect both your sell prices and your supply costs \u2014 that\u2019s called competitive pressure.');
    }
  }
  if (G.encounters.some(e => e.name === 'Mother Nature')) lessons.push('\uD83C\uDF27\uFE0F Mother Nature represents external risk \u2014 events you can\u2019t prevent but can prepare for. Keeping cash reserves is your safety net against the unexpected.');
  if (G.wagonCapacity === 50) lessons.push('\uD83D\uDED2 Spending money to increase your business\u2019s capacity is called a capital investment. It costs now but earns more later. Consider upgrading next time!');
  if (G.wagonCapacity > 50) lessons.push('\uD83D\uDED2 Smart capital investment! Upgrading your wagon gave you more carrying capacity, which means more earning potential per trip.');
  const lessonStartNW = G.netWorthHistory[0] || 50;
  if (G.netWorth < lessonStartNW) lessons.push('\uD83D\uDCC9 You ended with less than you started. That\u2019s okay \u2014 every business owner learns from setbacks. Try again with what you\u2019ve learned!');
  if (G.mode === 'full') lessons.push('\uD83D\uDE97 In Full Market Mode, you had to travel before selling. Every purchase was a commitment made with incomplete information \u2014 that\u2019s how real business works.');
  return lessons;
}

function drawEndChart() {
  const canvas = document.getElementById('endChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.parentElement.clientWidth - 16;
  canvas.width = w; canvas.height = 140;
  const data = G.netWorthHistory;
  const max = Math.max(...data, 60);
  const min = Math.min(...data, 0);
  const range = max - min || 1;
  const stepX = w / (data.length - 1 || 1);
  // Grid
  ctx.strokeStyle = '#e0d6c2'; ctx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    const y = 10 + (i/3)*120;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
  // $50 baseline
  const baseY = 130 - ((50 - min)/range)*120;
  ctx.strokeStyle = '#c9302c'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(0,baseY); ctx.lineTo(w,baseY); ctx.stroke();
  ctx.setLineDash([]);
  // Line
  ctx.strokeStyle = '#5a7a4a'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  data.forEach((v,i) => {
    const x = i * stepX;
    const y = 130 - ((v-min)/range)*120;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Labels
  ctx.fillStyle = '#8a7a68'; ctx.font = '10px Nunito';
  ctx.fillText('$'+min.toFixed(0), 2, 138);
  ctx.fillText('$'+max.toFixed(0), 2, 18);
  ctx.fillText('Day 1', 2, baseY-4);
  ctx.fillText('Day '+data.length, w-30, 138);
}

// Draw sparkline on stats tab
const observer = new MutationObserver(() => {
  const canvas = document.getElementById('sparkline');
  if (canvas && G.netWorthHistory) {
    const ctx = canvas.getContext('2d');
    const w = canvas.parentElement.clientWidth - 16;
    canvas.width = w; canvas.height = 120;
    const data = G.netWorthHistory;
    const max = Math.max(...data, 60);
    const min = Math.min(...data, 0);
    const range = max - min || 1;
    const stepX = w / (data.length - 1 || 1);
    ctx.strokeStyle = '#5a7a4a'; ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((v,i) => {
      const x = i * stepX;
      const y = 110 - ((v-min)/range)*100;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.fillStyle = '#8a7a68'; ctx.font = '10px Nunito';
    ctx.fillText('$'+max.toFixed(0), 2, 14);
    ctx.fillText('$'+min.toFixed(0), 2, 118);
  }
});
observer.observe(document.getElementById('app'), { childList:true, subtree:true });

// ===== INITIAL RENDER =====
render();
</script>
